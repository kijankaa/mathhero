<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>MathHero — Mockup Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050316; display: flex; justify-content: center; align-items: center;
           height: 100vh; overflow: hidden; }
    #fl { font-family: 'Fredoka One'; position: fixed; top: -200px; opacity: 0; }
  </style>
</head>
<body>
<div id="fl">.</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ─── Stałe kolorystyczne ────────────────────────────────────────────────────
const C = {
  bg1: 0x2a1060, bg2: 0x050316,
  orange: 0xff6b35, orangeDark: 0xbf360c,
  cyan: 0x26c6da, cyanDark: 0x00838f,
  yellow: 0xffd54f, yellowDark: 0xf57f17,
  purple: 0x7c4dff, purpleDark: 0x4527a0,
  pink: 0xf06292, pinkDark: 0xad1457,
  white: 0xffffff, suit: 0xeceff1, suitDark: 0xcfd8dc,
};

// ─── Scena Menu ─────────────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene {
  constructor() { super('Menu'); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    this._bg(W, H);
    this._stars(W, H);
    this._planets(W, H);
    this._mathFloats(W, H);
    this._title(W);
    this._astronaut(W / 2, 355);
    this._buttons(W, H);
    this._shootingStars(W, H);
  }

  // ── Tło gradientowe + mgławice ──────────────────────────────────────────
  _bg(W, H) {
    const g = this.add.graphics();
    g.fillGradientStyle(C.bg1, C.bg1, C.bg2, C.bg2, 1);
    g.fillRect(0, 0, W, H);
    for (const [x, y, r, col, a] of [
      [W * 0.78, H * 0.12, 230, 0x6d28d9, 0.09],
      [W * 0.18, H * 0.82, 200, 0x1e40af, 0.08],
      [W * 0.5,  H * 0.48, 320, 0x4c1d95, 0.04],
    ]) {
      const n = this.add.graphics();
      n.fillStyle(col, a);
      n.fillCircle(x, y, r);
    }
  }

  // ── Gwiazdy ─────────────────────────────────────────────────────────────
  _stars(W, H) {
    for (let i = 0; i < 200; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      const s = Math.random() * 2 + 0.3;
      const a = Math.random() * 0.6 + 0.3;
      const g = this.add.graphics();
      g.fillStyle(C.white, a);
      g.fillCircle(x, y, s);
      if (Math.random() < 0.35) {
        this.tweens.add({
          targets: g, alpha: 0.08,
          duration: 900 + Math.random() * 2400,
          yoyo: true, repeat: -1,
          delay: Math.random() * 3500,
          ease: 'Sine.easeInOut'
        });
      }
    }
  }

  // ── Planety dekoracyjne ─────────────────────────────────────────────────
  _planets(W, H) {
    this._planet(W * 0.10, H * 0.10, 44, C.orange, C.orangeDark);
    this._planet(W * 0.88, H * 0.07, 33, C.cyan,   C.cyanDark);
    this._planet(W * 0.94, H * 0.40, 19, C.yellow, C.yellowDark);
    this._planet(W * 0.06, H * 0.55, 14, C.pink,   C.pinkDark);
  }

  _planet(x, y, r, col, dark) {
    const g = this.add.graphics();
    g.fillStyle(col, 1);      g.fillCircle(0, 0, r);
    g.fillStyle(dark, 0.55);  g.fillEllipse(r * 0.15, r * 0.2, r * 1.3, r * 0.85);
    g.fillStyle(C.white, 0.35); g.fillCircle(-r * 0.28, -r * 0.3, r * 0.22);
    g.x = x; g.y = y;
    this.tweens.add({
      targets: g, y: y - 15,
      duration: 2000 + Math.random() * 900,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
      delay: Math.random() * 1200
    });
  }

  // ── Unoszące się działania matematyczne ─────────────────────────────────
  _mathFloats(W, H) {
    ['2+3=?', '7×8=?', '15-6=?', '24÷4=?', '9+5=?', '6×7=?', '18÷3=?'].forEach((expr, i) => {
      const x = 40 + Math.random() * (W - 80);
      const startY = 220 + Math.random() * (H - 400);
      const t = this.add.text(x, startY, expr, {
        fontFamily: 'Fredoka One', fontSize: '20px', color: '#ffffff', alpha: 0
      }).setOrigin(0.5).setAlpha(0);

      this.tweens.add({
        targets: t, y: startY - 80, alpha: 0.07,
        duration: 3500 + Math.random() * 2500,
        delay: i * 700 + Math.random() * 2000,
        yoyo: true, repeat: -1,
        ease: 'Sine.easeInOut'
      });
    });
  }

  // ── Tytuł ────────────────────────────────────────────────────────────────
  _title(W) {
    const title = this.add.text(W / 2, 68, 'MATH HERO', {
      fontFamily: 'Fredoka One', fontSize: '70px', color: '#FFE66D',
      stroke: '#a05500', strokeThickness: 5,
      shadow: { x: 0, y: 5, color: '#000', blur: 14, fill: true }
    }).setOrigin(0.5).setAlpha(0).setY(80);

    const sub = this.add.text(W / 2, 145, 'Zostań Mistrzem Matematyki!', {
      fontFamily: 'Fredoka One', fontSize: '23px', color: '#93c5fd'
    }).setOrigin(0.5).setAlpha(0);

    this.tweens.add({ targets: title, alpha: 1, y: 72, duration: 650, ease: 'Back.easeOut', delay: 100 });
    this.tweens.add({ targets: sub,   alpha: 1,         duration: 500,                        delay: 450 });
    this.tweens.add({
      targets: title, scaleX: 1.025, scaleY: 1.025,
      duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: 900
    });
  }

  // ── Astronauta rysowany kodem ────────────────────────────────────────────
  _astronaut(cx, cy) {
    const c = this.add.container(cx, cy + 30).setAlpha(0);
    const g = this.add.graphics();

    // Cień
    g.fillStyle(0x000000, 0.22);
    g.fillEllipse(0, 96, 130, 22);

    // Nogi
    g.fillStyle(C.suit, 1);
    g.fillRoundedRect(-38, 60, 30, 46, 12);
    g.fillRoundedRect(8, 60, 30, 46, 12);

    // Buty
    g.fillStyle(C.orange, 1);
    g.fillRoundedRect(-42, 95, 36, 13, 6);
    g.fillRoundedRect(6, 95, 36, 13, 6);

    // Lewe ramię (za ciałem)
    g.fillStyle(C.suit, 1);
    g.fillRoundedRect(-74, -8, 30, 54, 12);

    // Ciało
    g.fillStyle(C.suit, 1);
    g.fillRoundedRect(-46, -12, 92, 76, 18);

    // Pomarańczowy pasek
    g.fillStyle(C.orange, 1);
    g.fillRect(-46, 20, 92, 14);
    g.fillStyle(C.suit, 1);
    g.fillRoundedRect(-46, 14, 92, 10, { tl: 0, tr: 0, bl: 5, br: 5 });
    g.fillRoundedRect(-46, 28, 92, 10, { tl: 5, tr: 5, bl: 0, br: 0 });

    // Ekranik na klatce
    g.fillStyle(C.cyan, 0.85);
    g.fillRoundedRect(-17, -4, 34, 22, 6);
    g.fillStyle(0x00e5cc, 1);
    g.fillCircle(-7, 7, 3.5);
    g.fillCircle(0,  7, 3.5);
    g.fillCircle(7,  7, 3.5);

    // Prawe ramię + plecak
    g.fillStyle(C.suit, 1);
    g.fillRoundedRect(44, -8, 30, 54, 12);
    g.fillStyle(C.suitDark, 1);
    g.fillRoundedRect(44, -6, 22, 50, 8);
    g.fillStyle(0xb0bec5, 1);
    g.fillRoundedRect(47, -2, 11, 18, 4);
    g.fillRoundedRect(47, 20, 11, 18, 4);

    // Rękawice
    g.fillStyle(C.orange, 1);
    g.fillCircle(-59, 48, 16);
    g.fillCircle(59, 48, 16);
    // Blask rękawic
    g.fillStyle(C.white, 0.3);
    g.fillCircle(-64, 43, 5);
    g.fillCircle(54,  43, 5);

    // Pierścień hełmu
    g.fillStyle(C.suitDark, 1);
    g.fillRoundedRect(-47, -14, 94, 18, 9);

    // Hełm
    g.fillStyle(C.suit, 1);
    g.fillCircle(0, -58, 55);

    // Wizjer (ciemny tył)
    g.fillStyle(0x006064, 1);
    g.fillEllipse(0, -60, 74, 56);
    // Wizjer (cyjan)
    g.fillStyle(C.cyan, 1);
    g.fillEllipse(0, -62, 68, 50);
    // Głębia wizjera
    g.fillStyle(0x00acc1, 0.7);
    g.fillEllipse(3, -60, 58, 42);

    // Odbłysk
    g.fillStyle(C.white, 0.48);
    g.fillEllipse(-14, -72, 24, 14);
    g.fillStyle(C.white, 0.28);
    g.fillEllipse(-8, -63, 13, 9);

    // Antena
    g.fillStyle(C.suitDark, 1);
    g.fillRect(-3, -113, 6, 32);
    g.fillStyle(C.orange, 1);
    g.fillCircle(0, -117, 9);
    g.fillStyle(C.white, 0.5);
    g.fillCircle(-2, -120, 3);

    c.add(g);

    // Animacja unoszenia
    this.tweens.add({
      targets: c, y: cy - 15,
      duration: 2300, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: 200
    });

    // Wejście
    this.tweens.add({
      targets: c, alpha: 1, y: cy,
      duration: 700, delay: 150, ease: 'Back.easeOut'
    });

    // Iskierki wokół
    this._sparkles(cx, cy - 20);
  }

  _sparkles(cx, cy) {
    const cols = [C.yellow, C.cyan, C.orange, C.purple, C.white];
    for (let i = 0; i < 7; i++) {
      const angle = (i / 7) * Math.PI * 2;
      const r = 95 + Math.random() * 30;
      const sx = cx + Math.cos(angle) * r;
      const sy = cy + Math.sin(angle) * r * 0.55;
      const col = cols[Math.floor(Math.random() * cols.length)];

      const g = this.add.graphics();
      g.fillStyle(col, 1);
      const pts = [];
      for (let j = 0; j < 8; j++) {
        const a = j * Math.PI / 4;
        const rad = j % 2 === 0 ? 6 : 2.5;
        pts.push({ x: Math.cos(a) * rad, y: Math.sin(a) * rad });
      }
      g.fillPoints(pts, true);
      g.x = sx; g.y = sy;

      this.tweens.add({
        targets: g,
        scaleX: { from: 0, to: 0.8 + Math.random() * 0.5 },
        scaleY: { from: 0, to: 0.8 + Math.random() * 0.5 },
        alpha: { from: 0.85, to: 0 },
        duration: 800 + Math.random() * 900,
        repeat: -1, delay: i * 280 + Math.random() * 600,
        ease: 'Quad.easeOut'
      });
    }
  }

  // ── Przyciski menu ───────────────────────────────────────────────────────
  _buttons(W, H) {
    const BTNS = [
      { label: 'GRAJ',       color: C.orange, dark: C.orangeDark, big: true },
      { label: 'GALAKTYKA',  color: C.cyan,   dark: C.cyanDark },
      { label: 'KOLEKCJA',   color: C.yellow, dark: C.yellowDark, textColor: '#5d3a00' },
      { label: 'STATYSTYKI', color: C.purple, dark: C.purpleDark },
      { label: 'KONFIGURUJ', color: C.pink,   dark: C.pinkDark },
    ];
    const bW = 420, bH = 72, startY = 535, gap = 86;
    BTNS.forEach((b, i) => this._btn(W / 2, startY + i * gap, bW, bH, b, i));
  }

  _btn(x, y, w, h, data, idx) {
    const c = this.add.container(x, y + 70).setAlpha(0);

    // Cień
    const sh = this.add.graphics();
    sh.fillStyle(0x000000, 0.38);
    sh.fillRoundedRect(-w / 2 + 5, 6, w, h, 22);

    // Tło przycisku
    const bg = this.add.graphics();
    bg.fillStyle(data.color, 1);
    bg.fillRoundedRect(-w / 2, -h / 2, w, h, 22);

    // Górny połysk
    bg.fillStyle(C.white, 0.2);
    bg.fillRoundedRect(-w / 2 + 4, -h / 2 + 4, w - 8, h / 2 - 4,
      { tl: 19, tr: 19, bl: 0, br: 0 });

    // Dolna krawędź (głębia 3D)
    bg.fillStyle(data.dark, 0.65);
    bg.fillRoundedRect(-w / 2 + 4, h / 2 - 12, w - 8, 9,
      { tl: 0, tr: 0, bl: 19, br: 19 });

    const fs = data.big ? '36px' : '28px';
    const tc = data.textColor || '#ffffff';
    const lbl = this.add.text(0, 1, data.label, {
      fontFamily: 'Fredoka One', fontSize: fs,
      color: tc, stroke: '#00000044', strokeThickness: 2
    }).setOrigin(0.5);

    c.add([sh, bg, lbl]);
    c.setSize(w, h);
    c.setInteractive({ cursor: 'pointer' });

    c.on('pointerover', () => {
      this.tweens.killTweensOf(c);
      this.tweens.add({ targets: c, scaleX: 1.05, scaleY: 1.05, duration: 130, ease: 'Back.easeOut' });
    });
    c.on('pointerout', () => {
      this.tweens.killTweensOf(c);
      this.tweens.add({ targets: c, scaleX: 1, scaleY: 1, duration: 180 });
    });
    c.on('pointerdown', () => {
      this.tweens.killTweensOf(c);
      this.tweens.add({ targets: c, scaleX: 0.95, scaleY: 0.95, duration: 70 });
      this._burst(x, y, data.color);
    });
    c.on('pointerup', () => {
      this.tweens.killTweensOf(c);
      this.tweens.add({
        targets: c, scaleX: 1.06, scaleY: 1.06, duration: 130, ease: 'Back.easeOut',
        onComplete: () => this.tweens.add({ targets: c, scaleX: 1, scaleY: 1, duration: 180 })
      });
    });

    // Wejście z prawej ze staggerem
    this.tweens.add({
      targets: c, alpha: 1, y: y,
      duration: 480, delay: 350 + idx * 90, ease: 'Back.easeOut'
    });
  }

  // ── Cząsteczki po kliknięciu ─────────────────────────────────────────────
  _burst(x, y, color) {
    for (let i = 0; i < 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist  = 50 + Math.random() * 80;
      const g = this.add.graphics();
      g.fillStyle(color, 1);
      g.fillCircle(0, 0, 3 + Math.random() * 5);
      g.x = x; g.y = y;
      this.tweens.add({
        targets: g,
        x: x + Math.cos(angle) * dist,
        y: y + Math.sin(angle) * dist - 25,
        alpha: 0, scale: 0,
        duration: 480, ease: 'Quad.easeOut',
        onComplete: () => g.destroy()
      });
    }
  }

  // ── Spadające gwiazdy ────────────────────────────────────────────────────
  _shootingStars(W, H) {
    const spawn = () => {
      const sx = Math.random() * W * 0.55, sy = Math.random() * H * 0.25;
      const g = this.add.graphics();
      g.fillStyle(C.white, 0.85);
      g.fillRect(0, -1, 90, 2);
      g.x = sx; g.y = sy;
      g.setRotation(0.42);
      this.tweens.add({
        targets: g, x: sx + 320, y: sy + 130, alpha: 0,
        duration: 650, ease: 'Quad.easeIn',
        onComplete: () => { g.destroy(); this.time.delayedCall(3000 + Math.random() * 5000, spawn); }
      });
    };
    this.time.delayedCall(1800, spawn);
    this.time.delayedCall(4500, spawn);
  }
}

// ─── Konfiguracja Phaser ────────────────────────────────────────────────────
const gameConfig = {
  type: Phaser.AUTO,
  width: 768,
  height: 1024,
  backgroundColor: '#050316',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: MenuScene
};

document.fonts.ready.then(() => new Phaser.Game(gameConfig));
</script>
</body>
</html>
