<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>MathHero — Selenia</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020b18; display: flex; justify-content: center;
           align-items: center; height: 100vh; overflow: hidden; }
    #fl { font-family: 'Fredoka One'; position: fixed; top: -200px; }
  </style>
</head>
<body>
<div id="fl">.</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const VW = 768, VH = 1024, WH = 2800;

const NODES = [
  [384, 2580, 'start',  'START'],
  [200, 2340, 'math',   '5 + 3 = ?'],
  [540, 2110, 'chest',  'SKARB'],
  [230, 1880, 'math',   '7 + 6 = ?'],
  [520, 1650, 'npc',    'SPOTKANIE'],
  [210, 1420, 'math',   '12 + 9 = ?'],
  [510, 1190, 'chest',  'SKARB'],
  [230, 960,  'math',   '15 + 8 = ?'],
  [500, 730,  'boss',   'BOSS'],
  [350, 500,  'math',   '11 + 7 = ?'],
  [384, 270,  'finish', 'KONIEC'],
];

const NODE_COLORS = {
  start: 0x4ecdc4, math: 0x7c4dff, chest: 0xffd54f,
  npc: 0x66bb6a, boss: 0xff4444, finish: 0xffe66d,
};
const NODE_ICONS = {
  start: '▶', math: '?', chest: '★', npc: '!', boss: '☠', finish: '✦',
};

// Strefy planety — różnią się kolorem tła i ozdobnikami
const ZONES = [
  { y: 1870, h: 930, tint: 0x112244, label: 'Wejście do Jaskini',  alpha: 0.0  },
  { y: 930,  h: 940, tint: 0x0d1e44, label: 'Zamrożone Ruiny',     alpha: 0.08 },
  { y: 0,    h: 930, tint: 0x1a0a44, label: 'Trona Kryształowa',   alpha: 0.14 },
];

class PlanetScene extends Phaser.Scene {
  constructor() { super('Planet'); }

  preload() {
    this.load.image('tile',      'selenia_tile.jpg');
    this.load.image('astronaut', 'astronaut.jpg');
  }

  create() {
    this._currentNode = 0;
    this._moving = false;
    this.cameras.main.setBounds(0, 0, VW, WH);

    this._drawTiledBackground();
    this._drawZoneOverlays();
    this._drawZoneLandmarks();
    this._drawPath();
    this._drawNodes();
    this._createPlayer();
    this._createHUD();
    this._particles();

    this.cameras.main.setScrollY(
      Phaser.Math.Clamp(NODES[0][1] - VH * 0.6, 0, WH - VH)
    );
  }

  // ── Kafelkowane tło ───────────────────────────────────────────────────────
  _drawTiledBackground() {
    const tex    = this.textures.get('tile');
    const srcH   = tex.getSourceImage().height;
    const srcW   = tex.getSourceImage().width;
    const tileH  = Math.round(VW * srcH / srcW); // zachowaj proporcje przy szerokości VW
    const rows   = Math.ceil(WH / tileH) + 1;

    for (let r = 0; r < rows; r++) {
      const img = this.add.image(VW / 2, r * tileH + tileH / 2, 'tile')
        .setDisplaySize(VW, tileH)
        .setDepth(0);
      // Naprzemiennie lekko odbij pionowo żeby ukryć powtórzenie
      if (r % 2 === 1) img.setFlipY(true);
    }
  }

  // ── Nakładki stref — delikatny kolor różnicuje obszary ───────────────────
  _drawZoneOverlays() {
    ZONES.forEach(({ y, h, tint, alpha }) => {
      if (alpha <= 0) return;
      const g = this.add.graphics().setDepth(2);
      g.fillStyle(tint, alpha);
      g.fillRect(0, y, VW, h);
    });

    // Gradient boczny — ciemniejsze krawędzie dla poczucia głębi
    const edge = this.add.graphics().setDepth(3);
    edge.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0.55, 0, 0, 0.55);
    edge.fillRect(0, 0, 80, WH);
    edge.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0, 0.55, 0.55, 0);
    edge.fillRect(VW - 80, 0, 80, WH);
  }

  // ── Landmarki stref — elementy rysowane kodem ────────────────────────────
  _drawZoneLandmarks() {
    // STREFA DOLNA — wielkie kryształy po bokach
    this._crystalGroup(60,  2500, 0x00e5ff, 3);
    this._crystalGroup(680, 2400, 0x00e5ff, 2);
    this._crystalGroup(80,  2150, 0x00c8e8, 2);
    this._crystalGroup(700, 2200, 0x00c8e8, 2);

    // STREFA ŚRODKOWA — ruiny (kamienne bloki)
    this._ruinBlock(55,  1750, 90, 70);
    this._ruinBlock(620, 1680, 80, 90);
    this._ruinBlock(45,  1350, 70, 80);
    this._ruinBlock(640, 1250, 85, 65);
    this._ruinBlock(55,  1050, 75, 85);

    // Glowing cracks w strefie środkowej
    this._glowCrack(150, 1600, 200, 1480, 0x4ecdc4);
    this._glowCrack(580, 1380, 650, 1280, 0x4ecdc4);
    this._glowCrack(100, 1100, 300, 980,  0x00e5ff);

    // STREFA GÓRNA — boss arena (wielki okrąg, kolumny)
    this._bossArena(384, 620);
    this._crystalGroup(50,  800, 0xaa44ff, 3);
    this._crystalGroup(700, 750, 0xaa44ff, 3);
    this._crystalGroup(50,  450, 0xff44aa, 2);
    this._crystalGroup(700, 400, 0xff44aa, 2);

    // Etykiety stref
    ZONES.forEach(({ y, h, label }) => {
      const t = this.add.text(VW / 2, y + 28, label.toUpperCase(), {
        fontFamily: 'Fredoka One', fontSize: '13px',
        color: '#ffffff', stroke: '#000', strokeThickness: 3, alpha: 0.35
      }).setOrigin(0.5).setDepth(4).setAlpha(0.3);
    });
  }

  _crystalGroup(x, y, color, count) {
    const g = this.add.graphics().setDepth(4);
    for (let i = 0; i < count; i++) {
      const ox = (i - count / 2) * 18;
      const h  = 40 + i * 12 + Math.random() * 10;
      const w  = 12 - i * 1;
      // Kryształ (sześciokąt)
      g.fillStyle(color, 0.75);
      g.fillPoints([
        { x: x + ox,     y: y - h      },
        { x: x + ox + w, y: y - h * 0.4},
        { x: x + ox + w, y: y          },
        { x: x + ox - w, y: y          },
        { x: x + ox - w, y: y - h * 0.4},
      ], true);
      // Błysk
      g.fillStyle(0xffffff, 0.3);
      g.fillPoints([
        { x: x + ox - 2, y: y - h      },
        { x: x + ox + 3, y: y - h * 0.6},
        { x: x + ox - 2, y: y - h * 0.5},
      ], true);
    }
    // Poświata u podstawy
    g.fillStyle(color, 0.15);
    g.fillEllipse(x, y + 5, count * 36, 14);

    // Pulsowanie
    this.tweens.add({
      targets: g, alpha: 0.45,
      duration: 1500 + Math.random() * 1000,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
      delay: Math.random() * 2000
    });
  }

  _ruinBlock(x, y, w, h) {
    const g = this.add.graphics().setDepth(4);
    g.fillStyle(0x1a2a3a, 0.9);
    g.fillRect(x, y, w, h);
    // Krawędź (kamień)
    g.lineStyle(2, 0x2a4060, 0.8);
    g.strokeRect(x, y, w, h);
    // Detale — pęknięcia
    g.lineStyle(1, 0x1e3a55, 0.6);
    g.lineBetween(x + w * 0.3, y, x + w * 0.4, y + h);
    g.lineBetween(x, y + h * 0.4, x + w, y + h * 0.5);
    // Mech/lód
    g.fillStyle(0x00e5ff, 0.08);
    g.fillRect(x + 2, y + 2, w - 4, h * 0.3);
  }

  _glowCrack(x1, y1, x2, y2, color) {
    const g = this.add.graphics().setDepth(3);
    g.lineStyle(3, color, 0.6);
    g.lineBetween(x1, y1, x2, y2);
    g.lineStyle(8, color, 0.1);
    g.lineBetween(x1, y1, x2, y2);
    this.tweens.add({
      targets: g, alpha: 0.2,
      duration: 2000 + Math.random() * 1500,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
      delay: Math.random() * 2000
    });
  }

  _bossArena(cx, cy) {
    const g = this.add.graphics().setDepth(4);
    // Zewnętrzny pierścień areny
    g.lineStyle(3, 0xaa00ff, 0.5);
    g.strokeCircle(cx, cy, 200);
    g.lineStyle(1, 0xaa00ff, 0.2);
    g.strokeCircle(cx, cy, 180);
    // Runiczne znaczniki
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const rx = cx + Math.cos(a) * 200;
      const ry = cy + Math.sin(a) * 200;
      g.fillStyle(0xaa00ff, 0.6);
      g.fillCircle(rx, ry, 6);
    }
    // Środkowy symbol
    g.lineStyle(2, 0xff44aa, 0.5);
    g.strokeCircle(cx, cy, 40);
    g.fillStyle(0xff44aa, 0.08);
    g.fillCircle(cx, cy, 40);
    // Krzyż w centrum
    g.lineStyle(1, 0xff44aa, 0.4);
    g.lineBetween(cx - 30, cy, cx + 30, cy);
    g.lineBetween(cx, cy - 30, cx, cy + 30);

    // Animacja areny
    this.tweens.add({
      targets: g, alpha: 0.4,
      duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });
  }

  // ── Ścieżka ───────────────────────────────────────────────────────────────
  _drawPath() {
    const shadow = this.add.graphics().setDepth(5);
    shadow.lineStyle(18, 0x000000, 0.5);
    this._tracePath(shadow, 4, 4);

    const main = this.add.graphics().setDepth(6);
    // Podłoże ścieżki
    main.lineStyle(14, 0x0a1830, 0.95);
    this._tracePath(main, 0, 0);
    // Nawierzchnia
    main.lineStyle(8, 0x0f2a50, 0.9);
    this._tracePath(main, 0, 0);
    // Boczne linie
    main.lineStyle(2, 0x2a5080, 0.5);
    this._tracePath(main, -6, 0);
    this._tracePath(main, 6, 0);

    // Ukończona część
    this._glowGfx = this.add.graphics().setDepth(7);
    this._redrawGlowPath();
  }

  _buildCurve(ox, oy) {
    const pts = [];
    for (let i = 0; i < NODES.length; i++) {
      if (i === 0) {
        pts.push({ x: NODES[0][0] + ox, y: NODES[0][1] + oy });
        continue;
      }
      const [px, py] = NODES[i - 1];
      const [cx, cy] = NODES[i];
      const steps = 14;
      const bend  = i % 2 === 0 ? 50 : -50;
      const bx    = (px + cx) / 2 + bend;
      const by    = (py + cy) / 2;
      for (let t = 1; t <= steps; t++) {
        const f = t / steps;
        pts.push({
          x: (1-f)*(1-f)*px + 2*(1-f)*f*bx + f*f*cx + ox,
          y: (1-f)*(1-f)*py + 2*(1-f)*f*by + f*f*cy + oy,
        });
      }
    }
    return pts;
  }

  _tracePath(g, ox, oy) {
    const pts = this._buildCurve(ox, oy);
    g.beginPath();
    pts.forEach((p, i) => i === 0 ? g.moveTo(p.x, p.y) : g.lineTo(p.x, p.y));
    g.strokePath();
  }

  _redrawGlowPath() {
    this._glowGfx.clear();
    if (this._currentNode === 0) return;
    const pts   = this._buildCurve(0, 0);
    const limit = Math.round(this._currentNode / (NODES.length - 1) * (pts.length - 1));
    this._glowGfx.lineStyle(5, 0x4ecdc4, 0.9);
    this._glowGfx.beginPath();
    pts.slice(0, limit + 1).forEach((p, i) =>
      i === 0 ? this._glowGfx.moveTo(p.x, p.y) : this._glowGfx.lineTo(p.x, p.y)
    );
    this._glowGfx.strokePath();
  }

  // ── Węzły ─────────────────────────────────────────────────────────────────
  _drawNodes() {
    this._nodeContainers = [];
    NODES.forEach(([x, y, type, label], i) => {
      const done   = i < this._currentNode;
      const cur    = i === this._currentNode;
      const locked = i > this._currentNode;
      const col    = NODE_COLORS[type];
      const r      = cur ? 34 : 26;

      const c = this.add.container(x, y).setDepth(9);

      const sh = this.add.graphics();
      sh.fillStyle(0x000000, 0.5);
      sh.fillCircle(3, 5, r + 3);

      const ring = this.add.graphics();
      if (cur) {
        ring.lineStyle(6, 0xffffff, 0.5);
        ring.strokeCircle(0, 0, r + 7);
      }
      ring.lineStyle(cur ? 4 : 3, col, locked ? 0.2 : 1);
      ring.strokeCircle(0, 0, r);

      const bg = this.add.graphics();
      bg.fillStyle(locked ? 0x080f18 : col, locked ? 1 : 0.88);
      bg.fillCircle(0, 0, r - 2);
      if (!locked) {
        bg.fillStyle(0xffffff, 0.2);
        bg.fillCircle(-r * 0.28, -r * 0.28, r * 0.36);
        if (locked) { bg.fillStyle(0x000000, 0.5); bg.fillCircle(0, 0, r - 2); }
      }

      const ico = this.add.text(0, 1, NODE_ICONS[type], {
        fontFamily: 'Fredoka One', fontSize: `${cur ? 22 : 17}px`,
        color: locked ? '#1a2e44' : '#fff',
        stroke: '#000', strokeThickness: 3,
      }).setOrigin(0.5);

      const lbl = this.add.text(0, r + 14, label, {
        fontFamily: 'Fredoka One', fontSize: '12px',
        color: locked ? '#1a2e44' : (cur ? '#ffe66d' : '#93c5fd'),
        stroke: '#000', strokeThickness: 3,
      }).setOrigin(0.5);

      c.add([sh, ring, bg, ico, lbl]);

      if (cur) {
        this.tweens.add({
          targets: c, scaleX: 1.1, scaleY: 1.1,
          duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
        const gl = this.add.graphics().setDepth(8);
        gl.fillStyle(col, 0.2);
        gl.fillCircle(x, y, 70);
        this.tweens.add({
          targets: gl, alpha: 0.04,
          duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
        this._activeGlow = gl;
      }

      if (!locked) {
        c.setSize(r * 2 + 24, r * 2 + 24);
        c.setInteractive({ cursor: 'pointer' });
        c.on('pointerdown', () => this._onNodeTap(i));
        c.on('pointerover', () => {
          if (!cur) this.tweens.add({ targets: c, scaleX: 1.12, scaleY: 1.12, duration: 100 });
        });
        c.on('pointerout', () => {
          if (!cur) this.tweens.add({ targets: c, scaleX: 1, scaleY: 1, duration: 120 });
        });
      }
      this._nodeContainers.push(c);
    });
  }

  _refreshNodes() {
    this._nodeContainers.forEach(c => c.destroy());
    if (this._activeGlow) this._activeGlow.destroy();
    this._drawNodes();
    this._redrawGlowPath();
  }

  // ── Postać ────────────────────────────────────────────────────────────────
  _createPlayer() {
    const [sx, sy] = NODES[0];
    this._player = this.add.container(sx, sy - 44).setDepth(11);

    // Cień
    const shadow = this.add.graphics();
    shadow.fillStyle(0x000000, 0.3);
    shadow.fillEllipse(0, 42, 44, 10);

    // Nogi (osobne obiekty — animowane)
    this._legL = this.add.graphics();
    this._legL.fillStyle(0xb0cce0, 1);
    this._legL.fillRoundedRect(-11, 18, 9, 16, 3);
    this._legL.fillStyle(0x7899aa, 1);
    this._legL.fillRoundedRect(-12, 31, 11, 6, 2);

    this._legR = this.add.graphics();
    this._legR.fillStyle(0xb0cce0, 1);
    this._legR.fillRoundedRect(2, 18, 9, 16, 3);
    this._legR.fillStyle(0x7899aa, 1);
    this._legR.fillRoundedRect(1, 31, 11, 6, 2);

    // Ciało (statyczne)
    this._bodyPart = this.add.graphics();
    this._bodyPart.fillStyle(0xd0e8ff, 1);
    this._bodyPart.fillRoundedRect(-12, -4, 24, 22, 5);
    this._bodyPart.fillStyle(0x4ecdc4, 0.9);
    this._bodyPart.fillRoundedRect(-7, 0, 14, 9, 3);
    this._bodyPart.fillStyle(0xb8d8f0, 1);
    this._bodyPart.fillRoundedRect(-20, -2, 9, 14, 4);
    this._bodyPart.fillRoundedRect(11, -2, 9, 14, 4);
    // Hełm
    this._bodyPart.fillStyle(0xe8f4ff, 1);
    this._bodyPart.fillCircle(0, -20, 16);
    this._bodyPart.fillStyle(0x081830, 1);
    this._bodyPart.fillEllipse(0, -20, 24, 16);
    this._bodyPart.fillStyle(0x00e5ff, 0.5);
    this._bodyPart.fillEllipse(0, -20, 20, 13);
    this._bodyPart.fillStyle(0xffffff, 0.7);
    this._bodyPart.fillEllipse(-5, -27, 8, 5);
    this._bodyPart.lineStyle(3, 0xb8d8f0, 0.8);
    this._bodyPart.strokeCircle(0, -20, 16);

    const arrow = this.add.text(0, -52, '▲', {
      fontFamily: 'Fredoka One', fontSize: '14px',
      color: '#ffe66d', stroke: '#000', strokeThickness: 3,
    }).setOrigin(0.5);

    this._player.add([shadow, this._legL, this._legR, this._bodyPart, arrow]);
    this._idleTween = null;
    this._walkTweenL = null; this._walkTweenR = null; this._walkBob = null;
    this._startIdle();
  }

  _startIdle() {
    if (this._walkTweenL) { this._walkTweenL.stop(); this._walkTweenL = null; }
    if (this._walkTweenR) { this._walkTweenR.stop(); this._walkTweenR = null; }
    if (this._walkBob)    { this._walkBob.stop();    this._walkBob    = null; }
    if (this._idleTween)  { this._idleTween.stop(); }
    this._legL.y = 0; this._legR.y = 0; this._bodyPart.y = 0;
    this._player.scaleX = 1;
    const baseY = this._player.y;
    this._idleTween = this.tweens.add({
      targets: this._player, y: baseY - 8,
      duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
    });
  }

  _startWalk(dirX) {
    if (this._idleTween)  { this._idleTween.stop();  this._idleTween  = null; }
    if (this._walkTweenL) { this._walkTweenL.stop(); }
    if (this._walkTweenR) { this._walkTweenR.stop(); }
    if (this._walkBob)    { this._walkBob.stop(); }
    this._legL.y = 0; this._legR.y = 0; this._bodyPart.y = 0;
    this._player.scaleX = dirX < 0 ? -1 : 1;
    this._walkTweenL = this.tweens.add({
      targets: this._legL, y: -7,
      duration: 210, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
    });
    this._walkTweenR = this.tweens.add({
      targets: this._legR, y: -7,
      duration: 210, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: 210,
    });
    this._walkBob = this.tweens.add({
      targets: this._bodyPart, y: -3,
      duration: 210, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
    });
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  _createHUD() {
    const bar = this.add.graphics().setScrollFactor(0).setDepth(20);
    bar.fillStyle(0x020c1a, 0.94);
    bar.fillRect(0, 0, VW, 68);
    bar.lineStyle(2, 0x1a4a80, 1);
    bar.lineBetween(0, 68, VW, 68);

    this.add.text(VW / 2, 34, '❄  SELENIA', {
      fontFamily: 'Fredoka One', fontSize: '29px',
      color: '#4ecdc4', stroke: '#000', strokeThickness: 3,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(21);

    this.add.text(20, 34, '← Mapa', {
      fontFamily: 'Fredoka One', fontSize: '17px',
      color: '#93c5fd', stroke: '#000', strokeThickness: 3,
    }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(21).setInteractive({ cursor: 'pointer' });

    this._crystalLbl = this.add.text(VW - 16, 20, '💎 0 / 15', {
      fontFamily: 'Fredoka One', fontSize: '16px',
      color: '#ffe66d', stroke: '#000', strokeThickness: 3,
    }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(21);

    this._nodeLbl = this.add.text(VW - 16, 50, `Węzeł 1 / ${NODES.length}`, {
      fontFamily: 'Fredoka One', fontSize: '13px',
      color: '#93c5fd', stroke: '#000', strokeThickness: 2,
    }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(21);

    // Przycisk demo
    const btnY = VH - 54, bW = 270, bH = 52;
    const btnG = this.add.graphics().setScrollFactor(0).setDepth(20);
    this._drawBtn(btnG, VW / 2, btnY, bW, bH, 0x7c4dff, 0x4527a0);

    this._nextBtn = this.add.text(VW / 2, btnY, 'NASTĘPNY WĘZEŁ  ▶', {
      fontFamily: 'Fredoka One', fontSize: '21px',
      color: '#fff', stroke: '#000', strokeThickness: 2,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(21).setInteractive({ cursor: 'pointer' });

    this._nextBtn.on('pointerdown',  () => this._advanceToNext());
    this._nextBtn.on('pointerover',  () => this.tweens.add({ targets: [btnG, this._nextBtn], scaleX: 1.04, scaleY: 1.04, duration: 100 }));
    this._nextBtn.on('pointerout',   () => this.tweens.add({ targets: [btnG, this._nextBtn], scaleX: 1,    scaleY: 1,    duration: 150 }));
  }

  _drawBtn(g, cx, cy, w, h, col, dark) {
    g.fillStyle(0x000000, 0.35);
    g.fillRoundedRect(cx - w/2 + 4, cy - h/2 + 5, w, h, 20);
    g.fillStyle(col, 1);
    g.fillRoundedRect(cx - w/2, cy - h/2, w, h, 20);
    g.fillStyle(0xffffff, 0.18);
    g.fillRoundedRect(cx - w/2 + 3, cy - h/2 + 3, w - 6, h / 2 - 3, { tl:18, tr:18, bl:0, br:0 });
    g.fillStyle(dark, 0.55);
    g.fillRoundedRect(cx - w/2 + 3, cy + h/2 - 11, w - 6, 8, { tl:0, tr:0, bl:18, br:18 });
  }

  // ── Cząsteczki ────────────────────────────────────────────────────────────
  _particles() {
    // Świetliki
    for (let i = 0; i < 55; i++) {
      const startX = 30 + Math.random() * (VW - 60);
      const startY = Math.random() * WH;
      const col    = Math.random() < 0.7 ? 0x00e5ff : 0xaa44ff;
      const g      = this.add.graphics().setDepth(10);
      g.fillStyle(col, 0.65 + Math.random() * 0.3);
      g.fillCircle(0, 0, 1.5 + Math.random() * 2);
      g.x = startX; g.y = startY;

      this.tweens.add({
        targets: g,
        x: startX + (Math.random() - 0.5) * 110,
        y: startY - 90 - Math.random() * 140,
        alpha: 0,
        duration: 2800 + Math.random() * 3200,
        delay: Math.random() * 6000,
        repeat: -1,
        ease: 'Sine.easeIn',
        onRepeat: () => {
          g.x = 30 + Math.random() * (VW - 60);
          g.y = Math.random() * WH;
          g.alpha = 0.8;
        }
      });
    }

    // Lodowy pył
    for (let i = 0; i < 70; i++) {
      const sx = Math.random() * VW, sy = Math.random() * WH;
      const g  = this.add.graphics().setDepth(10);
      g.fillStyle(0xffffff, 0.12 + Math.random() * 0.2);
      g.fillCircle(0, 0, 0.8 + Math.random());
      g.x = sx; g.y = sy;
      this.tweens.add({
        targets: g, y: sy - 250 - Math.random() * 350, alpha: 0,
        duration: 8000 + Math.random() * 6000,
        delay: Math.random() * 10000, repeat: -1,
        onRepeat: () => { g.x = Math.random() * VW; g.y = Math.random() * WH; g.alpha = 0.25; }
      });
    }
  }

  // ── Dialog węzła ──────────────────────────────────────────────────────────
  _onNodeTap(idx) {
    if (this._moving || idx !== this._currentNode) return;
    this._showDialog(idx);
  }

  _showDialog(idx) {
    const [,, type, label] = NODES[idx];
    const col   = NODE_COLORS[type];
    const hexC  = '#' + col.toString(16).padStart(6, '0');
    const names = { math:'ZADANIE MATEMATYCZNE', chest:'SKRZYNIA SKARBÓW',
                    npc:'TAJEMNICZE SPOTKANIE',  boss:'BITWA Z BOSSEM',
                    start:'START', finish:'KONIEC PLANETY' };
    const descs = { math:  'Rozwiąż zadanie\ni zdobądź kryształy!',
                    chest: 'Odkryłeś skrzynię skarbów!\nCo kryje się w środku?',
                    npc:   'Tajemnicza istota czeka.\nCo jej powiedzieć?',
                    boss:  'Kryształowy Golem strzeże przejścia.\nCzas na bitwę!',
                    start: 'Twoja przygoda\nna Selenii zaczyna się tutaj.',
                    finish:'Dotarłeś na szczyt!\nMożesz lecieć na Marsa.' };
    const rwds  = { math:'+2 kryształy', chest:'+5 kryształów!',
                    npc:'+1 wskazówka',  boss:'+10 kryształów + Medal',
                    start:'', finish:'Planeta ukończona!' };

    const pY = VH / 2 - 155;
    const ov = this.add.graphics().setScrollFactor(0).setDepth(30);
    ov.fillStyle(0x000000, 0.75);
    ov.fillRect(0, 0, VW, VH);

    const panel = this.add.graphics().setScrollFactor(0).setDepth(31);
    panel.fillStyle(0x08121e, 1);
    panel.fillRoundedRect(44, pY, VW - 88, 310, 24);
    panel.lineStyle(3, col, 1);
    panel.strokeRoundedRect(44, pY, VW - 88, 310, 24);
    panel.fillStyle(col, 0.85);
    panel.fillRoundedRect(44, pY, VW - 88, 46, { tl:24, tr:24, bl:0, br:0 });

    const objs = [];
    const add  = (o) => { objs.push(o); return o; };

    add(this.add.text(VW/2, pY+23, names[type], {
      fontFamily:'Fredoka One', fontSize:'18px', color:'#fff', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5).setScrollFactor(0).setDepth(32));

    add(this.add.text(VW/2, pY+95, label, {
      fontFamily:'Fredoka One', fontSize:'40px', color:hexC, stroke:'#000', strokeThickness:4
    }).setOrigin(0.5).setScrollFactor(0).setDepth(32));

    add(this.add.text(VW/2, pY+165, descs[type], {
      fontFamily:'Fredoka One', fontSize:'18px', color:'#c8e6ff',
      stroke:'#000', strokeThickness:2, align:'center'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(32));

    if (rwds[type]) {
      add(this.add.text(VW/2, pY+232, rwds[type], {
        fontFamily:'Fredoka One', fontSize:'20px', color:'#ffe66d', stroke:'#000', strokeThickness:3
      }).setOrigin(0.5).setScrollFactor(0).setDepth(32));
    }

    const btnG = add(this.add.graphics().setScrollFactor(0).setDepth(32));
    this._drawBtn(btnG, VW/2, pY+283, 200, 48, col, 0x000000);

    const btnT = add(this.add.text(VW/2, pY+283, 'ZAGRAJ!', {
      fontFamily:'Fredoka One', fontSize:'22px', color:'#fff', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5).setScrollFactor(0).setDepth(33).setInteractive({ cursor:'pointer' }));

    const cleanup = () => { ov.destroy(); panel.destroy(); objs.forEach(o => o.destroy()); };
    btnT.on('pointerdown', () => { cleanup(); this._advanceToNext(); });
    ov.setInteractive().on('pointerdown', cleanup);
  }

  // ── Ruch postaci ──────────────────────────────────────────────────────────
  _advanceToNext() {
    if (this._moving || this._currentNode >= NODES.length - 1) return;
    this._moving = true;
    const next = this._currentNode + 1;
    const [tx, ty] = NODES[next];
    const [fx, fy] = NODES[this._currentNode];

    this._startWalk(tx - fx);

    const cpX  = (fx + tx) / 2;
    const cpY  = Math.min(fy, ty) - 80;
    const prog = { t: 0 };
    const fromY = fy - 44, toY = ty - 44, cpYo = cpY - 44;

    this.tweens.add({
      targets: prog, t: 1, duration: 1600, ease: 'Linear',
      onUpdate: () => {
        const t = prog.t, u = 1 - t;
        this._player.x = u*u*fx   + 2*u*t*cpX  + t*t*tx;
        this._player.y = u*u*fromY + 2*u*t*cpYo + t*t*toY;
      },
      onComplete: () => {
        this._player.x = tx; this._player.y = ty - 44;
        this._onArrived(next);
      },
    });
    this.cameras.main.pan(VW / 2, ty, 1600, 'Sine.easeInOut');
  }

  _onArrived(idx) {
    this._currentNode = idx;
    this._moving      = false;
    const [nx, ny]    = NODES[idx];
    this._startIdle();
    this._burst(nx, ny - 18, NODE_COLORS[NODES[idx][2]]);
    this._nodeLbl.setText(`Węzeł ${idx+1} / ${NODES.length}`);
    this._refreshNodes();
  }

  _burst(x, y, color) {
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2;
      const d = 30 + Math.random() * 60;
      const g = this.add.graphics().setDepth(12);
      g.fillStyle(color, 0.9);
      g.fillCircle(0, 0, 3 + Math.random() * 4);
      g.x = x; g.y = y;
      this.tweens.add({
        targets: g,
        x: x + Math.cos(a) * d, y: y + Math.sin(a) * d - 12,
        alpha: 0, scale: 0, duration: 420, ease: 'Quad.easeOut',
        onComplete: () => g.destroy()
      });
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width: VW, height: VH,
  backgroundColor: '#020b18',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: PlanetScene
};
document.fonts.ready.then(() => new Phaser.Game(config));
</script>
</body>
</html>
