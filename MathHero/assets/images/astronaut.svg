<svg xmlns="http://www.w3.org/2000/svg" width="200" height="280" viewBox="0 0 200 280">
  <!-- Plecak rakietowy -->
  <rect x="130" y="120" width="28" height="50" rx="8" fill="#bbb"/>
  <rect x="42" y="120" width="28" height="50" rx="8" fill="#bbb"/>
  <rect x="115" y="125" width="12" height="36" rx="4" fill="#e74c3c"/>
  <rect x="73" y="125" width="12" height="36" rx="4" fill="#e74c3c"/>

  <!-- Ciało skafandra -->
  <rect x="55" y="115" width="90" height="100" rx="22" fill="#e8e8e8"/>
  <!-- Pas -->
  <rect x="55" y="175" width="90" height="14" rx="4" fill="#bbb"/>
  <!-- Emblem na piersi -->
  <circle cx="100" cy="148" r="18" fill="#2980b9" opacity="0.9"/>
  <text x="100" y="154" font-size="16" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">★</text>

  <!-- Nogi -->
  <rect x="62" y="208" width="32" height="44" rx="12" fill="#ddd"/>
  <rect x="106" y="208" width="32" height="44" rx="12" fill="#ddd"/>
  <!-- Buty -->
  <rect x="56" y="240" width="42" height="22" rx="10" fill="#555"/>
  <rect x="100" y="240" width="42" height="22" rx="10" fill="#555"/>

  <!-- Ramiona / ręce -->
  <ellipse cx="42" cy="155" rx="16" ry="28" fill="#e8e8e8"/>
  <ellipse cx="158" cy="155" rx="16" ry="28" fill="#e8e8e8"/>
  <!-- Rękawice -->
  <ellipse cx="42" cy="182" rx="14" ry="12" fill="#555"/>
  <ellipse cx="158" cy="182" rx="14" ry="12" fill="#555"/>

  <!-- Szyja -->
  <rect x="84" y="98" width="32" height="22" rx="8" fill="#ccc"/>

  <!-- Hełm — tył -->
  <circle cx="100" cy="72" r="52" fill="#ddd"/>
  <!-- Hełm — przód (wizjer) -->
  <circle cx="100" cy="72" r="42" fill="#1a3a5c"/>
  <!-- Odblask wizjera -->
  <ellipse cx="85" cy="55" rx="14" ry="10" fill="white" opacity="0.18" transform="rotate(-20 85 55)"/>
  <!-- Twarz -->
  <circle cx="88" cy="68" r="5" fill="white" opacity="0.9"/>
  <circle cx="112" cy="68" r="5" fill="white" opacity="0.9"/>
  <circle cx="89" cy="69" r="2.5" fill="#1a1a3a"/>
  <circle cx="113" cy="69" r="2.5" fill="#1a1a3a"/>
  <!-- Uśmiech -->
  <path d="M 88 82 Q 100 92 112 82" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Obramowanie hełmu -->
  <circle cx="100" cy="72" r="52" fill="none" stroke="#aaa" stroke-width="4"/>
  <!-- Złoty detal na hełmie -->
  <circle cx="100" cy="20" r="6" fill="#f1c40f"/>
  <circle cx="100" cy="20" r="3" fill="#e67e22"/>
</svg>
